# LOCAL DEV OVERRIDE — opt-in only.
#
# This file is NOT auto-loaded by docker compose (it's `docker-compose.localdev.yml`
# rather than the magic `docker-compose.override.yml`). Plain
# `docker compose --profile cpu up -d` boots the live Quip Testnet. Pass
# this file explicitly to switch to the dev chain:
#
#     docker compose -f docker-compose.yml -f docker-compose.localdev.yml \
#         --profile cpu up -d
#
# Or just run `make localdev`, which wraps the same invocation plus the
# topology seeding step (the miner self-bootstraps on startup).
#
# This whole stack is namespaced: `make localdev` runs it under the
# `-p quip-localdev` project, and every service below gets a `-localdev`
# container_name (plus `quip-localdev-` volume names) so it can never collide
# with a live `make testnet` stack over the fixed global names (quip-postgres,
# quip-validator, ...) in the base docker-compose.yml. An explicit
# container_name opts a container OUT of project-name namespacing, so without
# these overrides the two stacks would fight over the same global names.
#
# Flips the stack from "join the live Quip Testnet" to "self-contained
# single-validator local dev chain" so the miner can mine immediately
# without waiting for upstream testnet plumbing. Flow (when invoked
# manually rather than via `make localdev`):
#
#   1. quip-validator boots against substrate's baked-in `dev` preset:
#      Alice is the sole authority (so GRANDPA can finalize solo), sudo,
#      and pre-funded. --force-authoring lets BABE seal without peers.
#      (Don't use `local` — that's Alice+Bob+Charlie and GRANDPA stalls
#      with only one voter online.)
#   2. quip-faucet runs //Alice as the funder (pre-funded at genesis).
#   3. Seed advantage2_system1 + Difficulty via //Alice sudo (one-shot):
#        docker compose -f docker-compose.yml -f docker-compose.localdev.yml \
#          --profile cpu run --rm \
#          -v $(pwd)/scripts/seed-advantage2-topology.py:/seed.py:ro \
#          --entrypoint python3 cpu /seed.py --sudo-key //Alice
#   4. The cpu/cuda miner self-bootstraps on startup: it registers itself in
#      QuantumPow.Miners and faucet-funds via the faucet_url in
#      data/config.toml (make localdev copies config/localdev.<profile>.toml
#      there, pointing at the colocated dev faucet). Topology must already be
#      seeded (step 3) or the self-bootstrap retry loop fails.

services:
  quip-validator:
    container_name: quip-validator-localdev
    command:
      - --chain=dev
      - --alice
      - --base-path=/data
      - --name=local-dev-validator
      - --validator
      - --force-authoring
      - --state-pruning=archive
      - --blocks-pruning=archive
      - --rpc-port=9944
      - --unsafe-rpc-external
      - --rpc-cors=*
      - --rpc-methods=unsafe
      - --prometheus-port=9615
      - --prometheus-external
      - --no-mdns
      - --unsafe-force-node-key-generation

  # The dev-faucet flip lives in config, not env: `make localdev` copies
  # config/localdev.<profile>.toml to data/config.toml (faucet_url =
  # http://quip-faucet:8087) before bringing the stack up. The miner has
  # no configuration env vars as of the quip-protocol v0.2.1-rc line.
  cpu:
    container_name: quip-cpu-localdev

  cuda:
    container_name: quip-cuda-localdev

  quip-faucet:
    container_name: quip-faucet-localdev
    profiles:
      # Pull the faucet into the miner profiles so a single
      # `--profile cpu up` brings it up alongside the validator + miner.
      - cpu
      - cuda
      - faucet

  # These three are unchanged from the base file except for the namespaced
  # container_name — they're listed here only so the localdev stack doesn't
  # reuse the base file's fixed global names.
  dashboard:
    container_name: quip-dashboard-localdev

  postgres:
    container_name: quip-postgres-localdev

  caddy:
    container_name: quip-caddy-localdev

# Re-declare the base file's named volumes with a localdev prefix. Services
# reference them by their compose key (pgdata / caddy-data / caddy-config),
# which is unchanged — only the global `name` is overridden, so the dev stack
# gets its own volumes instead of sharing testnet's quip-pgdata etc.
volumes:
  pgdata:
    name: quip-localdev-pgdata
  caddy-data:
    name: quip-localdev-caddy-data
  caddy-config:
    name: quip-localdev-caddy-config
