# quip-miner CUDA config template — forked from quip-protocol
# docker/quip-miner.cuda.toml (v0.2.1-rc36) with the canonical testnet
# faucet_url filled in. docker-compose.yml bind-mounts this file over
# /app/quip-miner.docker.toml so the entrypoint's first-run seed writes
# a config that auto-funds against Quip Testnet out of the box.
#
# Copied to /data/config.toml on first run; after that, data/config.toml
# is the single source of truth for the container — edit it and restart.
# `quip-miner --config` runs everything this file declares; there are
# no configuration env vars.

[miner]
# Ordered failover list — tried in order at startup, live-rotated on
# disconnect. When unset, the miner falls back to
# ["ws://quip-validator:9944", "ws://127.0.0.1:9944"] — a validator
# container named `quip-validator` on a shared docker network, then a
# node on this host.
# validators = ["ws://127.0.0.1:9944"]

# Hybrid sr25519 + ML-DSA-44 keystore. The entrypoint generates one at
# exactly this path on first run if missing — the path is fixed by that
# keygen step, so don't change it; mount your own keystore over
# /data/keystore.json to bring an existing key. BACK IT UP — the chain
# key lives here.
signer_key = "/data/keystore.json"

# Faucet bot for auto-topup when the wallet is underfunded at startup.
# Without it, an underfunded wallet fails fast with `wallet-underfunded`.
# Comment out to opt out of auto-funding (e.g. you pre-fund the account).
faucet_url = "https://faucet.testnet.quip.network"

# Operator-facing /api/v1 telemetry surface, served by the container's
# aggregator process. Caddy fronts this at quip-miner:8086 (see
# caddy/Caddyfile) — keep the two in sync if you change the port.
rest_host = "0.0.0.0"
rest_port = 8086

# Identification metadata — published on every startup as a signed
# MinerRegistry NodeDescriptor. Dashboards index miners by AccountId;
# these fields are the human-readable overlay.
#
# node_name defaults to the hostname — inside a container that is the
# random container ID, so set a label you will recognise.
#
# public_host is auto-detected via check.quip.network (with
# ipify / icanhazip / checkip.amazonaws.com / ident.me fallbacks) when
# unset. Set it explicitly behind NAT/load-balancers or air-gapped.
# node_name   = "rig-01"
# public_host = "miner.example.com"
# public_port = 8086

# Backend inventory — the active section(s) below decide what this
# container mines (see `quip-miner resolve-modes`). One worker process
# per backend group. One [cuda.N] section per GPU; shared tuning goes
# in [gpu]. Mempool participation is per-miner, set in [gpu] for the
# gpu group (defaults: cpu/gpu on, qpu off).
# [gpu]
# utilization = 100
# yielding    = false
# mempool     = false
[cuda.0]
