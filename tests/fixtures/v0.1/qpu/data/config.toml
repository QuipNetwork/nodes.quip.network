# Quip Network Node - QPU Mode Configuration (D-Wave)
# See quip-node.cpu.toml in quip-protocol for all options.

[global]
node_name = "qpu1.quip"
listen = "::"
port = 20049

public_host = "qpu-1.nodes.quip.network"

# Deterministic key generation — change this to a unique value for your node.
# If left as default, the entrypoint generates a random secret on first boot.
secret = "Power LEvel over 9000!!!"

auto_mine = true

# Peers (excluding self)
peer = [
    "cpu-1.quip.carback.us:20049",
    "gpu-1.quip.carback.us:20049",
    "gpu-2.quip.carback.us:20050",
]

timeout = 20
heartbeat_interval = 15
heartbeat_timeout = 300

# Genesis block configuration file path
# Defaults to "genesis_block.json" if not specified
genesis_config = "genesis_block.json"

# TLS/SSL for QUIC peer-to-peer
verify_tls = false

# TLS certificates (injected by certbot in entrypoint.sh)
tls_cert_file = "/data/certs/private/fullchain.pem"
tls_key_file = "/data/certs/private/privkey.pem"

# TOFU
tofu = true
trust_db = "/data/trust.db"

# REST API (-1 = disabled)
rest_host = "0.0.0.0"
rest_port = 443
rest_insecure_port = 80
webroot = "/data/webroot"

# Logging
log_level = "INFO"
node_log = "/data/logs/quip-node.log"
http_log = "/data/logs/quip-http.log"

# Telemetry
telemetry_enabled = true
telemetry_dir = "/data/telemetry"

[telemetry_api]
enabled = true                  # Defaults to telemetry_enabled value
# access_token = ""               # Bearer token for REST auth (empty = open access)
rate_limit_rpm = 6000             # Requests per minute per IP (burst floor = 10)
max_sse_connections = 20        # Max concurrent SSE connections
cache_refresh_interval = 5.0    # Seconds between telemetry dir scans

# QPU miner mode — presence of this section enables QPU mining
[qpu]

[dwave]
# D-Wave API token is read from DWAVE_API_KEY environment variable (set in .env)
token = "DEV-FIXTURE-FAKE-TOKEN-DO-NOT-USE"
solver = "Advantage2_system1"
dwave_region_url = "https://na-west-1.cloud.dwavesys.com/sapi/v2/"
#daily_budget = "5m"
daily_budget = "20m"
