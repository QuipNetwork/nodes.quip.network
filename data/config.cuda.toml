# Quip Network Node - CUDA GPU Mode Configuration
# See quip-node.cuda.toml in quip-protocol for all options.

[global]
genesis_config = "genesis_block.json"
node_name = "my-gpu-node"

# Deterministic key generation — change this to a unique value for your node.
# If left as default, the entrypoint generates a random secret on first boot.
secret = "CHANGE_ME"

# auto_mine = false

# Substrate validator RPC endpoints the miner submits work to. The first
# reachable entry is used; the rest are fallbacks. The cpu / cuda profiles
# bundle a local validator by default, so point at it via the compose
# network alias. The docker-compose.yml `QUIP_VALIDATORS` env var
# overrides this at launch time.
validators = [
    "ws://quip-validator:9944",
]
# Example for a miner pointing at a remote full node (e.g. when running the
# miner on a separate host from the validator):
# validators = [
#     "wss://cpu-1.nodes.quip.network/rpc",
# ]

# REST API (-1 = disabled)
# rest_insecure_port = 80 lets the bundled dashboard reach the node over the
# compose network via http://quip-node:80. External ingress flows through
# Caddy at /api/v1/* — the miner doesn't publish anything to the host.
rest_host = "0.0.0.0"
rest_port = -1
rest_insecure_port = 80
webroot = "/data/webroot"

# Telemetry
telemetry_enabled = true
telemetry_dir = "/data/telemetry"

# Logging
log_level = "INFO"
node_log = "/data/logs/quip-node.log"
http_log = "/data/logs/quip-http.log"

[gpu]
# CUDA GPU mining configuration
# Global defaults for all GPUs
# utilization = 100
# yielding = false

# Device sections ([cuda.0], [cuda.1], ...) are auto-generated
# by entrypoint.sh if not already present in /data/config.toml
# [cuda.0]
#
# [cuda.1]
# utilization = 50
# yielding = true
