# Quip Network Node - CPU Mode Configuration
# See quip-node.cpu.toml in quip-protocol for all options.

[global]
genesis_config = "genesis_block.json"
node_name = "my-cpu-node"
listen = "::"
port = 20049

# Set to your server's public hostname (DNS name for TLS, not IP)
# public_host = "my-node.example.com"

# Deterministic key generation — change this to a unique value for your node.
# If left as default, the entrypoint generates a random secret on first boot.
secret = "CHANGE_ME"

# auto_mine = false

peer = [
    "qpu-1.nodes.quip.network:20049",
    "cpu-1.quip.carback.us:20049",
    "gpu-1.quip.carback.us:20049",
    "gpu-2.quip.carback.us:20050",
]

timeout = 3
heartbeat_interval = 15
heartbeat_timeout = 300
verify_tls = false

# TLS certificates (injected by certbot in entrypoint.sh)
# tls_cert_file = "/data/certs/private/fullchain.pem"
# tls_key_file = "/data/certs/private/privkey.pem"

# TOFU
tofu = true
trust_db = "/data/trust.db"

# REST API (-1 = disabled)
# rest_insecure_port = 80 lets the bundled dashboard reach the node over the
# compose network via http://quip-node:80. External ingress is still
# controlled by the 80:80/tcp mapping in docker-compose.yml (commented out).
rest_host = "0.0.0.0"
rest_port = -1
rest_insecure_port = 80
webroot = "/data/webroot"

# Telemetry
telemetry_enabled = true
telemetry_dir = "/data/telemetry"

# Logging
log_level = "INFO"
node_log = "/data/logs/quip-node.log"
http_log = "/data/logs/quip-http.log"

[cpu]
# num_cpus is auto-set by entrypoint.sh if not already configured
