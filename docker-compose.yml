# Shared dashboard configuration. The dashboard is always present alongside
# every node profile; Caddy fronts it on the configured QUIP_HOSTNAME.
x-dashboard: &dashboard
  image: registry.gitlab.com/quip.network/dashboard.quip.network:${QUIP_DASHBOARD_TAG:-v0.2-preview}
  pull_policy: always
  container_name: quip-dashboard
  restart: unless-stopped
  env_file:
    - .env
  environment:
    DB_ADAPTER: postgres
    DATABASE_URL: postgresql://${POSTGRES_USER:-quip}:${POSTGRES_PASSWORD:-quip}@postgres:5432/${POSTGRES_DB:-quip}
    QUIP_NODE_URL: ${QUIP_NODE_URL:-http://quip-miner:80}
    QUIP_NODE_TOKEN: ${QUIP_NODE_TOKEN:-}
    # Substrate WS RPC for the indexer's substrate + descriptor workers.
    # Without this the indexer logs `substrate=disabled` and the chain
    # tab (epochs, finalized head, validator authorship, hardware
    # descriptor backfill) stays empty. Defaults to the colocated
    # validator alias; miner-only nodes point it at a remote validator.
    QUIP_VALIDATOR_RPC_URL: ${QUIP_VALIDATOR_RPC_URL:-ws://quip-validator:9944}
    PORT: "3001"
    RUN_SERVER: "true"
    RUN_INDEXER: "true"
  volumes:
    - ./dashboard-data:/data
  depends_on:
    postgres:
      condition: service_healthy

services:
  # Shared env block consumed by the quip-miner entrypoint (CPU + CUDA).
  # All variables are optional — the entrypoint falls back to /data/config.toml
  # and /data/keystore.json when unset. We override here to point at the
  # colocated validator + faucet and to expose the REST API on the bridge.
  cpu:
    image: registry.gitlab.com/quip.network/quip-protocol/quip-miner-cpu:${QUIP_MINER_TAG:-v0.2-preview}
    pull_policy: always
    container_name: quip-cpu
    restart: unless-stopped
    profiles:
      - cpu
      - validator-cpu
    # Restrict visible CPUs so the upstream entrypoint's `num_cpus = $(nproc)`
    # autodetect writes a polite default instead of saturating the host. Linux
    # `nproc` reads sched_getaffinity(2), which honors the cgroup cpuset — so
    # this is what the entrypoint actually sees, unlike `cpus:` (CFS quota).
    # Operators with dedicated miner hosts override with e.g. QUIP_MINER_CPUSET=0-15.
    cpuset: ${QUIP_MINER_CPUSET:-0}
    env_file:
      - .env
    environment:
      PUID: ${PUID:-1000}
      PGID: ${PGID:-1000}
      QUIP_VALIDATORS: ${QUIP_VALIDATORS:-ws://quip-validator:9944}
      QUIP_FAUCET_URL: ${QUIP_FAUCET_URL:-}
      QUIP_REST_HOST: ${QUIP_REST_HOST:-0.0.0.0}
      QUIP_REST_PORT: ${QUIP_REST_PORT:-80}
      QUIP_SIGNER_KEY: ${QUIP_SIGNER_KEY:-/data/keystore.json}
    volumes:
      - ./data:/data
    networks:
      default:
        aliases:
          - quip-miner
    depends_on:
      quip-validator:
        condition: service_started
        required: false

  cuda:
    image: registry.gitlab.com/quip.network/quip-protocol/quip-miner-cuda:${QUIP_MINER_TAG:-v0.2-preview}
    pull_policy: always
    container_name: quip-cuda
    restart: unless-stopped
    profiles:
      - cuda
      - validator-cuda
    env_file:
      - .env
    environment:
      PUID: ${PUID:-1000}
      PGID: ${PGID:-1000}
      QUIP_MODE: gpu
      QUIP_VALIDATORS: ${QUIP_VALIDATORS:-ws://quip-validator:9944}
      QUIP_FAUCET_URL: ${QUIP_FAUCET_URL:-}
      QUIP_REST_HOST: ${QUIP_REST_HOST:-0.0.0.0}
      QUIP_REST_PORT: ${QUIP_REST_PORT:-80}
      QUIP_SIGNER_KEY: ${QUIP_SIGNER_KEY:-/data/keystore.json}
    volumes:
      - ./data:/data
    networks:
      default:
        aliases:
          - quip-miner
    depends_on:
      quip-validator:
        condition: service_started
        required: false
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  # Substrate-based block-producing validator (quip-protocol-rs).
  # Operators running this MUST set QUIP_HOSTNAME to a real DNS name so Caddy
  # can front the RPC over TLS; localhost mode is not supported here.
  # Inbound 30333/tcp and 30333/udp must be reachable from the public internet
  # for libp2p peering.
  quip-validator:
    image: registry.gitlab.com/quip.network/quip-protocol-rs/quip-network-node:${QUIP_VALIDATOR_TAG:-v0.2-preview}
    pull_policy: always
    container_name: quip-validator
    restart: unless-stopped
    profiles:
      - validator-cpu
      - validator-cuda
    env_file:
      - .env
    environment:
      PUID: ${PUID:-1000}
      PGID: ${PGID:-1000}
    volumes:
      - ./data/validator-data:/data
      # Chain spec selector. Defaults to the canonical Quip Testnet spec;
      # override in .env for local dev:
      #   QUIP_CHAIN_SPEC=./data/chain-spec.json
      - ${QUIP_CHAIN_SPEC:-./chain-specs/quip-testnet.json}:/etc/quip/chain-spec.json:ro
    ports:
      - "30333:30333/tcp"
      - "30333:30333/udp"
    networks:
      default:
        aliases:
          - quip-validator
    command:
      # Bootnodes come from the chain spec's bootNodes array. Override per
      # deployment by adding additional `--bootnodes=<multiaddr>` entries
      # via a docker-compose.override.yml. Compose's env-var expansion
      # can't split a space-separated env var into multiple argv tokens,
      # so SUBSTRATE_BOOTNODES isn't wired here.
      - --chain=/etc/quip/chain-spec.json
      - --base-path=/data
      - --name=${VALIDATOR_NAME:-quip-validator}
      - --validator
      # Full archive node: keep every state trie + block body so historical RPC
      # (e.g. the dashboard descriptor worker scanning from genesis) works
      # without hitting "State already discarded" past the default 256-block
      # pruning window. Operators who want to reclaim disk can override these
      # via docker-compose.override.yml.
      - --state-pruning=archive
      - --blocks-pruning=archive
      - --rpc-port=9944
      - --unsafe-rpc-external
      - --rpc-cors=*
      - --rpc-methods=safe
      - --prometheus-port=9615
      - --prometheus-external
      - --no-mdns
      # Auto-generate the libp2p node identity on first boot. Required for
      # joiner / observer nodes that don't have a published peer id (substrate
      # otherwise refuses to start with NetworkKeyNotFound when --validator
      # is set). Bootnode operators replace this with --node-key-file=/data/node-key
      # per docs/testnet-deployment.md so their peer id matches the chain spec.
      - --unsafe-force-node-key-generation

  # Optional faucet sidecar. Layered additively on top of a validator profile:
  #   docker compose --profile validator-cpu --profile faucet up -d
  # See https://gitlab.com/quip.network/faucet for the upstream image.
  quip-faucet:
    image: registry.gitlab.com/quip.network/faucet:${QUIP_FAUCET_TAG:-latest}
    pull_policy: always
    container_name: quip-faucet
    restart: unless-stopped
    profiles:
      - faucet
    env_file:
      - .env
    environment:
      PUID: ${PUID:-1000}
      PGID: ${PGID:-1000}
      QUIP_FAUCET_ALLOW_ANY_CHAIN: ${QUIP_FAUCET_ALLOW_ANY_CHAIN:-0}
    networks:
      default:
        aliases:
          - quip-faucet
    depends_on:
      quip-validator:
        condition: service_started
        required: false
    command:
      - --node-url=${QUIP_FAUCET_NODE_URL:-ws://quip-validator:9944}
      - --faucet-key=${QUIP_FAUCET_KEY:-//Alice}
      - --listen=0.0.0.0
      - --port=8087
      - --rate-limit-seconds=${QUIP_FAUCET_RATE_LIMIT_SECONDS:-60}

  dashboard:
    <<: *dashboard
    profiles:
      - cpu
      - cuda
      - validator-cpu
      - validator-cuda

  postgres:
    image: postgres:16
    container_name: quip-postgres
    restart: unless-stopped
    profiles:
      - cpu
      - cuda
      - validator-cpu
      - validator-cuda
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-quip}
      POSTGRES_USER: ${POSTGRES_USER:-quip}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-quip}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-quip} -d ${POSTGRES_DB:-quip}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  caddy:
    image: caddy:2-alpine
    pull_policy: always
    container_name: quip-caddy
    restart: unless-stopped
    profiles:
      - cpu
      - cuda
      - validator-cpu
      - validator-cuda
    env_file:
      - .env
    environment:
      QUIP_HOSTNAME: ${QUIP_HOSTNAME:-:20049}
      # ACME registration email. Operators set CERT_EMAIL in .env before
      # exposing the site over TLS; the placeholder default keeps Caddy
      # parseable in dev mode where no ACME runs.
      CERT_EMAIL: ${CERT_EMAIL:-hostmaster@localhost}
      ZEROSSL_API_KEY: ${ZEROSSL_API_KEY:-}
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    ports:
      # 20049 is the public API port (telemetry + substrate RPC + dashboard).
      # 80/443 are the canonical TLS pair when QUIP_HOSTNAME is a real DNS
      # name; Caddy auto-redirects :80 -> :443 and provisions a Let's Encrypt
      # cert that covers both :443 and :20049.
      - "20049:20049"
      - "80:80"
      - "443:443"
    depends_on:
      - dashboard

volumes:
  pgdata:
    name: quip-pgdata
  caddy-data:
    name: quip-caddy-data
  caddy-config:
    name: quip-caddy-config
