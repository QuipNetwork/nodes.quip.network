services:
  cpu:
    image: registry.gitlab.com/quip.network/quip-protocol/quip-network-node-cpu:latest
    pull_policy: always
    container_name: quip-cpu
    restart: unless-stopped
    profiles:
      - cpu
      - cpu-nodash
    env_file:
      - .env
    volumes:
      - ./data:/data
    ports:
      - "20049:20049/udp"
      - "20049:20049/tcp"
      # REST interface (HTTP + HTTPS). Disabled by default so miner-only nodes
      # don't conflict with existing web servers on the host. Uncomment both
      # lines to expose the REST API and let the entrypoint provision a
      # Let's Encrypt certificate (requires CERT_EMAIL + public_host as DNS).
      # Full nodes will be required to expose this interface in a future release.
      # - "80:80/tcp"
      # - "443:443/tcp"
    networks:
      default:
        aliases:
          - quip-node

  cuda:
    image: registry.gitlab.com/quip.network/quip-protocol/quip-network-node-cuda:latest
    pull_policy: always
    container_name: quip-cuda
    restart: unless-stopped
    profiles:
      - cuda
      - cuda-nodash
    env_file:
      - .env
    volumes:
      - ./data:/data
    ports:
      - "20049:20049/udp"
      - "20049:20049/tcp"
      # REST interface (HTTP + HTTPS). Disabled by default so miner-only nodes
      # don't conflict with existing web servers on the host. Uncomment both
      # lines to expose the REST API and let the entrypoint provision a
      # Let's Encrypt certificate (requires CERT_EMAIL + public_host as DNS).
      # Full nodes will be required to expose this interface in a future release.
      # - "80:80/tcp"
      # - "443:443/tcp"
    networks:
      default:
        aliases:
          - quip-node
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  qpu:
    image: registry.gitlab.com/quip.network/quip-protocol/quip-network-node-cpu:latest
    pull_policy: always
    container_name: quip-qpu
    restart: unless-stopped
    profiles:
      - qpu
      - qpu-nodash
    env_file:
      - .env
    volumes:
      - ./data:/data
    ports:
      - "20049:20049/udp"
      - "20049:20049/tcp"
      # REST interface (HTTP + HTTPS). Disabled by default so miner-only nodes
      # don't conflict with existing web servers on the host. Uncomment both
      # lines to expose the REST API and let the entrypoint provision a
      # Let's Encrypt certificate (requires CERT_EMAIL + public_host as DNS).
      # Full nodes will be required to expose this interface in a future release.
      # - "80:80/tcp"
      # - "443:443/tcp"
    networks:
      default:
        aliases:
          - quip-node

  dashboard:
    image: registry.gitlab.com/quip.network/dashboard.quip.network:latest
    pull_policy: always
    container_name: quip-dashboard
    restart: unless-stopped
    profiles:
      - cpu
      - cuda
      - qpu
    env_file:
      - .env
    environment:
      DB_ADAPTER: postgres
      DATABASE_URL: postgresql://${POSTGRES_USER:-quip}:${POSTGRES_PASSWORD:-quip}@postgres:5432/${POSTGRES_DB:-quip}
      QUIP_NODE_URL: ${QUIP_NODE_URL:-http://quip-node:80}
      QUIP_NODE_TOKEN: ${QUIP_NODE_TOKEN:-}
      PORT: "3001"
      RUN_SERVER: "true"
      RUN_INDEXER: "true"
    volumes:
      - ./dashboard-data:/data
    ports:
      - "${DASHBOARD_PORT:-20080}:3001"
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16
    container_name: quip-postgres
    restart: unless-stopped
    profiles:
      - cpu
      - cuda
      - qpu
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-quip}
      POSTGRES_USER: ${POSTGRES_USER:-quip}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-quip}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-quip} -d ${POSTGRES_DB:-quip}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

volumes:
  pgdata:
    name: quip-pgdata
